# OpenWrt defaults for Netdata v2.10.3.
#
# The full generated configuration can be retrieved from a running agent:
#   curl -o /etc/netdata/netdata.conf http://127.0.0.1:19999/netdata.conf

[global]
	run as user = root
	process scheduling policy = keep
	OOM score = 0
	is ephemeral node = no

[db]
	update every = 1s
	db = dbengine
	memory deduplication (ksm) = no
	storage tiers = 3
	dbengine page cache size = 32MiB
	dbengine use all ram for caches = no
	dbengine tier 0 retention size = 256MiB
	dbengine tier 0 retention time = 14d
	dbengine tier 1 retention size = 256MiB
	dbengine tier 1 retention time = 3mo
	dbengine tier 2 retention size = 256MiB
	dbengine tier 2 retention time = 1y
	enable replication = yes

[directories]
	config = /etc/netdata
	stock config = /usr/lib/netdata/conf.d
	log = /var/log/netdata
	web = /usr/share/netdata/web
	cache = /var/cache/netdata
	lib = /var/lib/netdata
	cloud.d = /var/lib/netdata/cloud.d
	plugins = "/usr/libexec/netdata/plugins.d" "/etc/netdata/custom-plugins.d"
	registry = /var/lib/netdata/registry

[logs]
	daemon = syslog
	debug = none
	access = none
	collector = /var/log/netdata/collector.log
	health = /var/log/netdata/health.log
	level = info

[cloud]
	proxy = env
	query threads = 2

[health]
	enabled = yes
	enable stock health configuration = yes
	in memory max health log entries = 1000
	health log retention = 5d
	run at least every = 10s

[web]
	mode = static-threaded
	default port = 19999
	bind to = *
	web server threads = 4
	web server max sockets = 1024
	enable gzip compression = yes
	gzip compression level = 3
	disconnect idle clients after = 1m
	allow connections from = localhost fd* 10.* 192.168.* 172.16.* 172.17.* 172.18.* 172.19.* 172.20.* 172.21.* 172.22.* 172.23.* 172.24.* 172.25.* 172.26.* 172.27.* 172.28.* 172.29.* 172.30.* 172.31.*
	allow dashboard from = localhost fd* 10.* 192.168.* 172.16.* 172.17.* 172.18.* 172.19.* 172.20.* 172.21.* 172.22.* 172.23.* 172.24.* 172.25.* 172.26.* 172.27.* 172.28.* 172.29.* 172.30.* 172.31.*
	allow netdata.conf from = localhost fd* 10.* 192.168.* 172.16.* 172.17.* 172.18.* 172.19.* 172.20.* 172.21.* 172.22.* 172.23.* 172.24.* 172.25.* 172.26.* 172.27.* 172.28.* 172.29.* 172.30.* 172.31.*
	allow management from = localhost

[registry]
	enabled = no

[pulse]
	extended = no
	update every = 1s

[plugins]
	logread = yes
	proc = yes
	diskspace = yes
	timex = yes
	netdata pulse = yes
	cgroups = no
	charts.d = no
	python.d = no
	ioping = no
	tc = no
	slabinfo = no
	statsd = no
	systemd-journal = no
	enable running new plugins = yes
	check for new plugins every = 1m

[plugin:logread]
	update every = 1s

[plugin:systemd-journal]
	update every = 1s

[plugin:proc]
	ipc = no
	/proc/net/dev = yes
	/proc/stat = yes
	/proc/uptime = yes
	/proc/loadavg = yes
	/proc/meminfo = yes
	/proc/vmstat = yes
	/proc/diskstats = yes
	/proc/interrupts = yes
	/proc/softirqs = yes
	/proc/sys/fs/file-nr = yes
	/proc/sys/kernel/random/entropy_avail = yes
	/proc/net/stat/conntrack = yes
	/proc/net/sockstat = no
	/proc/net/sockstat6 = no
	/proc/net/netstat = no
	/proc/net/softnet_stat = no
	/proc/net/sctp/snmp = no
	/proc/net/ip_vs/stats = no
	/proc/net/stat/synproxy = no
	/proc/net/wireless = no
	/proc/net/rpc/nfs = no
	/proc/net/rpc/nfsd = no
	/proc/mdstat = no
	/proc/pressure = no
	/proc/spl/kstat/zfs/arcstats = no
	/sys/block/zram = no
	/sys/devices/pci/aer = no
	/sys/devices/system/edac/mc = no
	/sys/devices/system/node = no
	/sys/kernel/mm/ksm = no
	/sys/class/infiniband = no
	/sys/class/power_supply = no
	/sys/class/drm = no
	/sys/fs/btrfs = no

[plugin:proc:/proc/diskstats]
	path to /dev/vx/dsk =
	path to /dev/disk/by-label =
	exclude disks = loop* ram*
	performance metrics for partitions = no

[plugin:proc:/proc/net/stat/conntrack]
	filename to monitor = /proc/net/stat/nf_conntrack
